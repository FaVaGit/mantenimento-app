services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mantenimento-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      ACCESS_LOG_ENABLED: "true"
      CALCULATE_RATE_WINDOW_MS: 60000
      CALCULATE_RATE_MAX_REQUESTS: 30
      AUTH_URL_LOGIN_SECRET: "${AUTH_URL_LOGIN_SECRET:-}"
      AUTH_URL_LOGIN_ALLOWED_USER: "${AUTH_URL_LOGIN_ALLOWED_USER:-favagit}"
      AUTH_URL_LOGIN_SUPABASE_URL: "${AUTH_URL_LOGIN_SUPABASE_URL:-}"
      AUTH_URL_LOGIN_SUPABASE_ANON_KEY: "${AUTH_URL_LOGIN_SUPABASE_ANON_KEY:-}"
      AUTH_URL_LOGIN_SUPABASE_EMAIL: "${AUTH_URL_LOGIN_SUPABASE_EMAIL:-}"
      AUTH_URL_LOGIN_SUPABASE_PASSWORD: "${AUTH_URL_LOGIN_SUPABASE_PASSWORD:-}"
      AUTH_URL_LOGIN_MAX_TTL_SEC: "${AUTH_URL_LOGIN_MAX_TTL_SEC:-180}"
      API_ALLOWED_ORIGINS: "${API_ALLOWED_ORIGINS:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: mantenimento-nginx
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/mantenimento-app-docker.conf:/etc/nginx/conf.d/default.conf:ro