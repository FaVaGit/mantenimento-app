limit_req_zone $binary_remote_addr zone=calculate_api:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

upstream mantenimento_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

map $request_uri $log_api_only {
    default 0;
    ~^/api/ 1;
}

log_format privacy_min escape=json
    '{"time":"$time_iso8601","method":"$request_method","uri":"$uri","status":$status,"bytes":$body_bytes_sent,"rt":$request_time}';

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:TLSCache:10m;

    client_max_body_size 64k;
    access_log /var/log/nginx/mantenimento-app-api.log privacy_min if=$log_api_only;
    error_log /var/log/nginx/mantenimento-app-error.log warn;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /api/calculate {
        limit_req zone=calculate_api burst=10 nodelay;
        limit_conn per_ip_conn 20;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_pass http://mantenimento_backend;
    }

    location /api/ {
        limit_except GET POST { deny all; }
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_pass http://mantenimento_backend;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;
        proxy_pass http://mantenimento_backend;
    }
}