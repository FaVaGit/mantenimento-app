services:
  app:
    environment:
      ACCESS_LOG_ENABLED: "${ACCESS_LOG_ENABLED:-true}"
      ACCESS_LOG_SALT: "${ACCESS_LOG_SALT:-change-me}"
      CALCULATE_RATE_WINDOW_MS: "${CALCULATE_RATE_WINDOW_MS:-60000}"
      CALCULATE_RATE_MAX_REQUESTS: "${CALCULATE_RATE_MAX_REQUESTS:-30}"
      AUTH_URL_LOGIN_SECRET: "${AUTH_URL_LOGIN_SECRET:-}"
      AUTH_URL_LOGIN_ALLOWED_USER: "${AUTH_URL_LOGIN_ALLOWED_USER:-favagit}"
      AUTH_URL_LOGIN_SUPABASE_URL: "${AUTH_URL_LOGIN_SUPABASE_URL:-}"
      AUTH_URL_LOGIN_SUPABASE_ANON_KEY: "${AUTH_URL_LOGIN_SUPABASE_ANON_KEY:-}"
      AUTH_URL_LOGIN_SUPABASE_EMAIL: "${AUTH_URL_LOGIN_SUPABASE_EMAIL:-}"
      AUTH_URL_LOGIN_SUPABASE_PASSWORD: "${AUTH_URL_LOGIN_SUPABASE_PASSWORD:-}"
      AUTH_URL_LOGIN_MAX_TTL_SEC: "${AUTH_URL_LOGIN_MAX_TTL_SEC:-180}"
      API_ALLOWED_ORIGINS: "${API_ALLOWED_ORIGINS:-}"
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"